function fmtLong(d){return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});}

// ── IMAGE COMPRESSION ─────────────────────────────────────────────
function compressImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const max=800;let w=img.width,h=img.height;
        if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
        const c=document.createElement("canvas");c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);resolve(c.toDataURL("image/jpeg",0.5));
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });
}

// ── ICS ──────────────────────────────────────────────────────────
function escICS(s){return(s||"").replace(/\\/g,"\\\\").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;");}
function d2ICS(d){return d.replace(/-/g,"");}
function nextDay(d){const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+1);return dt.toISOString().slice(0,10).replace(/-/g,"");}
function buildICS(missions,users){
  const now=new Date().toISOString().replace(/[:\-]/g,"").slice(0,15)+"Z";
  const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Beylev//FR","CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Maintenance Beylev"];
  missions.forEach(m=>{
    const a=getUser(users,m.assignedTo);
    lines.push("BEGIN:VEVENT",`UID:${m.id}@beylev`,`DTSTAMP:${now}`,`DTSTART;VALUE=DATE:${d2ICS(m.date)}`,`DTEND;VALUE=DATE:${nextDay(m.dateEnd||m.date)}`,`SUMMARY:${escICS(m.title+(m.priority==="urgent"?" - URGENT":"")+(m.location?" - "+m.location:""))}`,m.location?`LOCATION:${escICS(m.location)}`:"",`DESCRIPTION:${escICS([m.description,"Assigne: "+a.name].filter(Boolean).join(" | "))}`,`STATUS:${m.status==="done"?"COMPLETED":m.status==="cancelled"?"CANCELLED":"CONFIRMED"}`,"END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  return lines.filter(Boolean).join("\r\n");
}
function downloadICS(content,filename){const a=document.createElement("a");a.href="data:text/calendar;charset=utf-8,"+encodeURIComponent(content);a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);}

// Notifie l'assigne quand une mission est creee ou validee
async function sendMissionEmail(mission,users,type="created"){
  const assignee=getUser(users,mission.assignedTo),creator=getUser(users,mission.createdBy);
  const subjects={created:`Nouvelle intervention : ${mission.title}`,validated:`Intervention validee : ${mission.title}`};
  const messages={created:`Une nouvelle intervention vous a ete assignee.`,validated:`Votre intervention a ete validee et vous est assignee.`};
  const dateStr=mission.dateEnd&&mission.dateEnd!==mission.date?`Du ${fmtShort(mission.date)} au ${fmtShort(mission.dateEnd)}`:fmtShort(mission.date);
  const recipients=users.filter(u=>u.email&&u.email.includes("@")&&u.id===mission.assignedTo);
  const params={subject:subjects[type]||subjects.created,message:messages[type]||messages.created,mission_title:mission.title,mission_date:dateStr,mission_location:mission.location||"Non precise",mission_description:mission.description||"—",mission_priority:mission.priority==="urgent"?"URGENT":"Normal",assigned_to:assignee.name,created_by:creator.name,app_url:window.location.href};
  await Promise.all(recipients.map(u=>sendEmailRaw({...params,to_email:u.email,to_name:u.name})));
}

}

    <div className="grid grid-cols-3 gap-3 p-3">
      {Array.from({length:12},(_,mi)=>{
        const daysInM=new Date(year,mi+1,0).getDate();
        const offset=(new Date(year,mi,1).getDay()+6)%7;
        const cells=[...Array(offset).fill(null),...Array.from({length:daysInM},(_,i)=>i+1)];
        return(
          <div key={mi} className="bg-white rounded-2xl p-2.5 shadow-sm border border-slate-100">

                  <button key={day} onClick={()=>onDayClick(ds)} className={`w-full aspect-square flex items-center justify-center text-[8px] rounded-sm font-medium relative transition ${isT?"bg-indigo-500 text-white":`${dm.length>0?"text-slate-700 font-bold":"text-slate-400"}`}`}>

        );
      })}

  );
}

// ── BOARD / KANBAN ────────────────────────────────────────────────
function BoardScreen({storage,users,currentUser,onMissionClick,onNewMission,onStatusChange}){
  const [filterLoc,setFilterLoc]=useState("all");
  const [extraM,setExtraM]=useState([]);
  const [dragging,setDragging]=useState(null);
  const [dragOver,setDragOver]=useState(null);

  useEffect(()=>{
    (async()=>{
      const now=new Date(),promises=[];
      for(let i=-6;i<=6;i++){if(i===0)continue;const d=shiftMonth(now.getFullYear(),now.getMonth(),i);promises.push(st.get(mkKey(d.y,d.m)));}
      const results=await Promise.all(promises);
      const flat=results.filter(Boolean).flatMap(r=>Object.values(normMissions(r)).flat());
      setExtraM(flat);
    })();
  },[]);

  const combined=[...Object.values(storage).flat(),...extraM];
  const seen=new Set();const deduped=combined.filter(m=>{if(seen.has(m.id))return false;seen.add(m.id);return true;});
  const allM=visibleMissions(deduped,currentUser).filter(isApproved);
  const locations=BUILDINGS_LIST.filter(b=>b!=="CUSTOM");
  const filtered=filterLoc==="all"?allM:allM.filter(m=>(m.location||"").trim()===filterLoc);
  const cols=["todo","inprogress","done","cancelled"];

  return(
    <div className="flex flex-col h-screen bg-slate-50">
      <div className="bg-indigo-900 text-white px-4 pt-10 pb-4 sticky top-0 z-30">
        <div className="flex items-center justify-between mb-3">
          <h1 className="font-bold text-lg">Tableau Kanban</h1>
          {(currentUser.role==="admin"||currentUser.role==="manager")&&<button onClick={onNewMission} className="bg-white/20 text-white text-xs font-bold px-3 py-1.5 rounded-xl">+ Nouvelle</button>}
        </div>
        <select value={filterLoc} onChange={e=>setFilterLoc(e.target.value)} className="w-full bg-white/10 border border-white/20 text-white text-xs rounded-xl px-3 py-2 focus:outline-none">
          <option value="all" className="text-slate-800">Tous les lieux</option>
          {locations.map(l=><option key={l} value={l} className="text-slate-800">{l.length>35?l.slice(0,35)+"...":l}</option>)}
        </select>
      </div>
      <div className="flex-1 overflow-x-auto hide-scroll pb-24" style={{height:"calc(100vh - 180px)"}}>
        <div className="flex gap-3 p-4" style={{minWidth:`${cols.length*272}px`,height:"100%"}}>
          {cols.map(status=>{
            const s=STATUS_CSS[status]||STATUS_CSS.todo;
            const items=filtered.filter(m=>m.status===status).sort((a,b)=>a.date.localeCompare(b.date));
            const isOver=dragOver===status;
            const canDrop=dragging&&dragging.status!==status;
            return(
              <div key={status} style={{width:260,flexShrink:0,display:"flex",flexDirection:"column"}}
                onDragOver={e=>{e.preventDefault();if(canDrop)setDragOver(status);}}
                onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragOver(null);}}
                onDrop={e=>{e.preventDefault();if(dragging&&dragging.status!==status){onStatusChange(dragging,status);}setDragging(null);setDragOver(null);}}
              >
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:16,marginBottom:12,background:s.bg,border:`1px solid ${isOver?"#6366f1":"#e2e8f0"}`,flexShrink:0}}>
                  <span style={{width:10,height:10,borderRadius:"50%",background:s.dot,display:"inline-block"}}/>
                  <span style={{fontSize:13,fontWeight:700,color:s.text}}>{s.label}</span>
                  <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:s.text,opacity:0.7}}>{items.length}</span>
                </div>
                {isOver&&canDrop&&<div style={{border:"2px dashed #6366f1",borderRadius:16,padding:12,marginBottom:8,textAlign:"center",background:"rgba(99,102,241,0.05)"}}><p style={{fontSize:12,color:"#6366f1",fontWeight:600}}>Deposer ici</p></div>}
                <div style={{display:"flex",flexDirection:"column",gap:8,overflowY:"auto",flex:1,paddingBottom:16}}>
                  {items.length===0&&!isOver&&<div style={{background:"rgba(255,255,255,0.6)",borderRadius:16,padding:16,textAlign:"center",border:"1px solid #f1f5f9"}}><p style={{fontSize:12,color:"#cbd5e1"}}>Aucune</p></div>}
                  {items.map(m=>(
                    <div key={m.id} draggable={true} onDragStart={()=>setDragging(m)} onDragEnd={()=>{setDragging(null);setDragOver(null);}} style={{opacity:dragging?.id===m.id?0.4:1,cursor:"grab"}}>
                      <BoardCard m={m} users={users} onClick={()=>onMissionClick(m)}/>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const [filterLoc,setFL]=useState("all"),[filterStatus,setFS]=useState("all"),[search,setSearch]=useState(""),[showS,setShowS]=useState(false);

function TrashSection({currentUser,onRestore}){
  const [trash,setTrash]=useState([]);
  const [expanded,setExpanded]=useState(false);
  useEffect(()=>{(async()=>{
    const t=await st.get("users_trash")||[];
    // Nettoie automatiquement les items > 30 jours
    const cutoff=Date.now()-30*24*3600*1000;
    const valid=t.filter(x=>new Date(x.deletedAt).getTime()>cutoff);
    if(valid.length!==t.length)await st.set("users_trash",valid);
    setTrash(valid);
  })();},[]);
  async function restore(u){
    const {deletedAt,deletedBy,...clean}=u;
    onRestore(clean);
    const newTrash=trash.filter(x=>x.id!==u.id||x.deletedAt!==u.deletedAt);
    await st.set("users_trash",newTrash);
    setTrash(newTrash);
  }
  async function purge(u){
    if(!window.confirm("Supprimer definitivement "+u.name+" ? Cette action est irreversible."))return;
    const newTrash=trash.filter(x=>x.id!==u.id||x.deletedAt!==u.deletedAt);
    await st.set("users_trash",newTrash);
    setTrash(newTrash);
  }
  if(trash.length===0)return null;
  return(
    <div className="bg-amber-50 border border-amber-200 rounded-2xl overflow-hidden">
      <button onClick={()=>setExpanded(v=>!v)} className="w-full flex items-center justify-between p-4">
        <div className="text-left">
          <p className="text-sm font-bold text-amber-700">🗑 Corbeille utilisateurs ({trash.length})</p>
          <p className="text-xs text-amber-600 mt-0.5">Conservés 30 jours - restaurables</p>
        </div>
        <span className="text-amber-600 text-lg">{expanded?"−":"+"}</span>
      </button>
      {expanded&&(
        <div className="px-4 pb-4 space-y-2 border-t border-amber-200 pt-3">
          {trash.map(u=>{
            const days=Math.floor((Date.now()-new Date(u.deletedAt).getTime())/(24*3600*1000));
            const remaining=30-days;
            return(
              <div key={u.id+u.deletedAt} className="bg-white rounded-xl p-3 flex items-center gap-3">
                <Avatar user={u} size="sm"/>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-slate-800">{u.name}</p>
                  <p className="text-[10px] text-slate-400">Supprimé par {u.deletedBy} il y a {days}j - reste {remaining}j</p>
                </div>
                <button onClick={()=>restore(u)} className="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg">Restaurer</button>
                <button onClick={()=>purge(u)} className="text-xs font-bold text-red-500 bg-red-50 px-2 py-1.5 rounded-lg">✕</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── HOSTAWAY IMPORT (portail Mikhael uniquement) ──────────────────
async function fetchTechMissionsWindow(techId, days=120){
  // Charge les missions du technicien sur les prochains mois pour savoir quand il est deja pris
  const now=new Date(),promises=[];
  const monthsToLoad=Math.ceil(days/30)+1;
  for(let i=0;i<=monthsToLoad;i++){const d=shiftMonth(now.getFullYear(),now.getMonth(),i);promises.push(st.get(mkKey(d.y,d.m)));}
  const results=await Promise.all(promises);
  const flat=results.filter(Boolean).flatMap(r=>Object.values(normMissions(r)).flat());
  const busyDates=new Set();
  flat.forEach(m=>{
    if(m.assignedTo!==techId)return;
    if(m.approved==="rejected")return; // rejete -> ne bloque pas
    if(m.status==="cancelled")return;
    const start=m.date,end=m.dateEnd||m.date;
    let cur=new Date(start+"T12:00:00");const endD=new Date(end+"T12:00:00");
    while(cur<=endD){busyDates.add(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
  });
  return busyDates;
}

function findFirstAvailableDate(reservations,busyDates,horizonDays=120){
  const today=new Date();
  for(let i=0;i<horizonDays;i++){
    const d=new Date(today);d.setDate(d.getDate()+i);
    const dow=d.getDay(); // 0=dimanche, 6=samedi
    if(dow===0||dow===6)continue; // jamais le week-end
    const ds=d.toISOString().slice(0,10);
    const occupied=(reservations||[]).some(r=>ds>=r.start&&ds<r.end);
    const techBusy=busyDates.has(ds);
    if(!occupied&&!techBusy)return ds;
  }
  return null;
}

function matchLocation(listingName){
  if(!listingName)return null;
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9]/g,"");
  const target=norm(listingName);
  const found=BUILDINGS_LIST.find(b=>b!=="CUSTOM"&&(norm(b).includes(target)||target.includes(norm(b))));
  return found||null;
}

      </div>

      <div>
        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">
          Date proposee {task.suggestedDate?<span className="text-emerald-600 font-normal normal-case">(1ere dispo trouvee)</span>:<span className="text-amber-600 font-normal normal-case">(aucune dispo auto - a choisir)</span>}
        </p>
        <input type="date" className={inp} value={date} onChange={e=>setDate(e.target.value)}/>
        {isTurnoverDay&&<p className="text-xs font-bold text-amber-600 bg-amber-50 rounded-lg px-3 py-2 mt-2">Jour de depart client - acces ENTRE 11H ET 15H uniquement</p>}
      </div>

      <div>
        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Duree (optionnel)</p>
        <div className="flex items-center gap-2">
          <input type="number" min="0" max="23" className={inp+" !w-20 text-center"} value={dH} onChange={e=>setDH(e.target.value)} placeholder="0"/>
          <span className="text-sm text-slate-500">h</span>
          <input type="number" min="0" max="59" step="15" className={inp+" !w-20 text-center"} value={dM} onChange={e=>setDM(e.target.value)} placeholder="00"/>
          <span className="text-sm text-slate-500">min</span>
        </div>
      </div>

      <div className="flex gap-2">
        <button disabled={busy} onClick={ignore} className="flex-1 border border-slate-200 text-slate-500 rounded-xl py-2.5 text-sm font-semibold disabled:opacity-50">Ignorer</button>
        <button disabled={busy} onClick={submit} className="flex-1 bg-indigo-600 text-white rounded-xl py-2.5 text-sm font-semibold disabled:opacity-50">Soumettre</button>
      </div>
    </div>
  );
}

function HostawayImportModal({users,onClose,onSubmitTask}){
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [tasks,setTasks]=useState([]);
  const techUser=users.find(u=>u.role==="tech");

  useEffect(()=>{(async()=>{
    try{
      const [res,handled]=await Promise.all([
        fetch("/api/hostaway-import").then(r=>r.json()),
        st.get("hostaway_handled_ids"),
      ]);
      if(res.error)throw new Error(res.error);
      const handledSet=new Set(handled||[]);
      const busyDates=techUser?await fetchTechMissionsWindow(techUser.id):new Set();

      const enriched=(res.tasks||[])
        .filter(t=>!handledSet.has(t.id))
        .map(t=>{
          const bestGuess=t.listingAddress||t.listingName;
          const matchedLocation=matchLocation(bestGuess);
          const reservations=t.listingId?(res.reservations[t.listingId]||[]):[];
          const suggestedDate=t.listingId?findFirstAvailableDate(reservations,busyDates):null;
          return{...t,matchedLocation,suggestedDate,reservations};
        });
      setTasks(enriched);
      setLoading(false);
    }catch(e){
      setError(e.message);
      setLoading(false);
    }
  })();},[]);

  async function markHandled(id){
    const handled=await st.get("hostaway_handled_ids")||[];
    if(!handled.includes(id)){handled.push(id);await st.set("hostaway_handled_ids",handled);}
  }
  async function handleSubmit(mission){
    await onSubmitTask(mission);
    await markHandled(mission.hostawayId);
  }
  async function handleIgnore(id){
    await markHandled(id);
  }

  return(
    <Modal onClose={onClose}>
      <div className="px-4 pb-8 space-y-4">
        <div className="flex items-center justify-between pt-2">
          <div>
            <h2 className="font-bold text-slate-900 text-lg">Import Hostaway</h2>
            <p className="text-xs text-slate-400 mt-0.5">Revue avant soumission - rien n'est envoye automatiquement</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 text-sm">✕</button>
        </div>

        {loading&&<div className="text-center py-16 text-slate-400">Chargement depuis Hostaway...</div>}
        {error&&<div className="bg-red-50 border border-red-200 rounded-2xl p-4 text-sm text-red-600">Erreur : {error}</div>}
        {!loading&&!error&&tasks.length===0&&<div className="text-center py-16"><p className="text-slate-500">Aucune nouvelle tache a importer</p></div>}
        {!loading&&!error&&tasks.length>0&&(
          <>
            <p className="text-xs text-slate-400">{tasks.length} tache{tasks.length>1?"s":""} trouvee{tasks.length>1?"s":""}</p>
            <div className="space-y-3">
              {tasks.map(t=><HostawayTaskRow key={t.id} task={t} users={users} techUser={techUser} onSubmit={handleSubmit} onIgnore={handleIgnore}/>)}
            </div>
          </>
        )}
      </div>
    </Modal>
  );
}

// ── ERROR BOUNDARY ───────────────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error){
      return <div style={{padding:20,color:"#dc2626",fontFamily:"monospace",background:"white",minHeight:"100vh"}}>
        <h2>Erreur dans l'application :</h2>
        <pre style={{background:"#fee2e2",padding:16,borderRadius:8,whiteSpace:"pre-wrap",fontSize:12}}>{this.state.error.message}{"\n\n"}{this.state.error.stack}</pre>
      </div>;
    }
    return this.props.children;
  }
}

// ── ROOT APP ──────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null),[users,setUsers]=useState([]),[storage,setStorage]=useState({});
  const [tab,setTab]=useState("home"),[booting,setBoot]=useState(true);
  const [selDate,setSelDate]=useState(today());
  const [cal,setCal]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [selM,setSelM]=useState(null),[showNewMission,setShowNew]=useState(false),[newMissionDate,setNewMissionDate]=useState(today());
  const [showValidation,setShowValidation]=useState(false),[editM,setEditM]=useState(null);
  const [showHostawayImport,setShowHostawayImport]=useState(false);
  const [globalPending,setGlobalPending]=useState([]);

  const monthStr=`${cal.y}-${padM(cal.m)}`;

  // Charge TOUTES les missions en attente, peu importe le mois affiche a l'ecran
  async function refreshGlobalPending(){
    const now=new Date(),promises=[];
    for(let i=-2;i<=6;i++){const d=shiftMonth(now.getFullYear(),now.getMonth(),i);promises.push(st.get(mkKey(d.y,d.m)));}
    const results=await Promise.all(promises);
    const flat=results.filter(Boolean).flatMap(r=>Object.values(normMissions(r)).flat());
    const seen=new Set();
    const pending=flat.filter(m=>{if(m.approved!==false)return false;if(seen.has(m.id))return false;seen.add(m.id);return true;});
    setGlobalPending(pending);
  }

  async function loadMonthStorage(y,m){
    const key=mkKey(y,m),prev=shiftMonth(y,m,-1),pk=mkKey(prev.y,prev.m);
    const [curr,prevData]=await Promise.all([st.get(key),st.get(pk)]);
    const cn=normMissions(curr),pn=normMissions(prevData),firstDay=`${y}-${padM(m)}-01`,extra={};
    Object.values(pn).flat().forEach(mission=>{const end=mission.dateEnd||mission.date;if(end>=firstDay){if(!extra[mission.date])extra[mission.date]=[];extra[mission.date].push(mission);}});
    return{...extra,...cn};
  }

  useEffect(()=>{(async()=>{
    let u=await st.get(SK_USERS);
    if(!u?.length){u=DEFAULT_USERS;await st.set(SK_USERS,u);}
    try{
      const saved=localStorage.getItem("beylev_session_v2")||localStorage.getItem("lv_session");
      if(saved){
        const su=JSON.parse(saved);
        const currentUser=u.find(x=>x.id===su.id);
        if(currentUser)setUser(currentUser);
      }
    }catch{}
    const s=await loadMonthStorage(cal.y,cal.m);setUsers(u);setStorage(s);setBoot(false);
    refreshGlobalPending();
  })();},[]);

  useEffect(()=>{
    if(!window.__CONFIGURED||booting)return;
    const key=mkKey(cal.y,cal.m);
    const unsub=window.__db.collection("app_data").doc(key).onSnapshot(async()=>{const s=await loadMonthStorage(cal.y,cal.m);setStorage(s);refreshGlobalPending();},e=>console.error(e));
    return()=>unsub();
  },[cal.y,cal.m,booting]);

  async function saveUsers(u){setUsers(u);await st.set(SK_USERS,u);}

  async function persistCurrent(ns){
    const toSave={};Object.entries(ns).forEach(([d,ms])=>{const own=ms.filter(x=>x.date.startsWith(monthStr));if(own.length)toSave[d]=own;});
    await st.set(mkKey(cal.y,cal.m),toSave);setStorage(ns);
  }
  // Met a jour une mission peu importe son mois (utilise pour validation globale)
  async function patchMissionAny(updated,missionDate){
    const targetMonth=missionDate.slice(0,7);
    const [ty,tm]=targetMonth.split("-").map(Number);
    const key=mkKey(ty,tm-1);
    const raw=normMissions(await st.get(key));
    const d=updated.date;
    if(missionDate!==d){
      raw[missionDate]=(raw[missionDate]||[]).filter(x=>x.id!==updated.id);
      if(!raw[missionDate]||!raw[missionDate].length)delete raw[missionDate];
    }
    if(!raw[d])raw[d]=[];
    const found=raw[d].some(x=>x.id===updated.id);
    raw[d]=found?raw[d].map(x=>x.id===updated.id?updated:x):[...raw[d],updated];
    await st.set(key,raw);
    // Si ca concerne le mois actuellement affiche, rafraichir aussi storage local
    if(targetMonth===monthStr||d.slice(0,7)===monthStr){
      const s=await loadMonthStorage(cal.y,cal.m);setStorage(s);
    }
    if(selM?.id===updated.id)setSelM(updated);
  }

  async function patchMission(updated,oldDate){
    const prev=shiftMonth(cal.y,cal.m,-1),prevStr=`${prev.y}-${padM(prev.m)}`,ns={...storage},d=updated.date;
    if(oldDate&&oldDate!==d){ns[oldDate]=(ns[oldDate]||[]).filter(x=>x.id!==updated.id);if(!ns[oldDate]||!ns[oldDate].length)delete ns[oldDate];ns[d]=[...(ns[d]||[]).filter(x=>x.id!==updated.id),updated];}
    else{if(!ns[d])ns[d]=[];const found=ns[d].some(x=>x.id===updated.id);ns[d]=found?ns[d].map(x=>x.id===updated.id?updated:x):[...ns[d],updated];}
    if(d.startsWith(monthStr)){const ts={};Object.entries(ns).forEach(([k,ms])=>{const own=ms.filter(x=>x.date.startsWith(monthStr));if(own.length)ts[k]=own;});await st.set(mkKey(cal.y,cal.m),ts);}
    else if(d.startsWith(prevStr)){const ts={};Object.entries(ns).forEach(([k,ms])=>{const own=ms.filter(x=>x.date.startsWith(prevStr));if(own.length)ts[k]=own;});await st.set(mkKey(prev.y,prev.m),ts);}
    setStorage(ns);if(selM?.id===updated.id)setSelM(updated);
  }
  async function addMission(m){
    // Ecrit toujours dans le mois Firestore correspondant a la date de la mission,
    // peu importe le mois actuellement affiche a l'ecran (bug corrige: avant, une
    // mission dont la date tombait hors du mois affiche n'etait jamais sauvegardee)
    const targetMonth=m.date.slice(0,7);
    const [ty,tm]=targetMonth.split("-").map(Number);
    const key=mkKey(ty,tm-1);
    const raw=normMissions(await st.get(key));
    if(!raw[m.date])raw[m.date]=[];
    raw[m.date]=[...raw[m.date],m];
    await st.set(key,raw);
    if(targetMonth===monthStr){
      const s=await loadMonthStorage(cal.y,cal.m);setStorage(s);
    }
    const fu=await st.get(SK_USERS)||users;
    if(isApproved(m)){
      sendMissionEmail(m,fu,"created").catch(()=>{});
    }else{
      sendValidationRequestEmail(m,fu).catch(()=>{});
    }
    refreshGlobalPending();
  }
  async function deleteMission(m){
    const prev=shiftMonth(cal.y,cal.m,-1),prevStr=`${prev.y}-${padM(prev.m)}`,ns={...storage};
    ns[m.date]=(ns[m.date]||[]).filter(x=>x.id!==m.id);if(!ns[m.date].length)delete ns[m.date];
    if(m.date.startsWith(monthStr)){const ts={};Object.entries(ns).forEach(([k,ms])=>{const own=ms.filter(x=>x.date.startsWith(monthStr));if(own.length)ts[k]=own;});await st.set(mkKey(cal.y,cal.m),ts);}
    else if(m.date.startsWith(prevStr)){const ts={};Object.entries(ns).forEach(([k,ms])=>{const own=ms.filter(x=>x.date.startsWith(prevStr));if(own.length)ts[k]=own;});await st.set(mkKey(prev.y,prev.m),ts);}
    setStorage(ns);setSelM(null);
  }

  const pendingCount=globalPending.length;
  const canAdmin=user?.role==="admin"||user?.adminAccess;

  function logout(){localStorage.removeItem("beylev_session_v2");localStorage.removeItem("lv_session");setUser(null);}

  if(booting)return <div className="flex flex-col items-center justify-center h-screen bg-indigo-900 gap-4"><div className="w-16 h-16 bg-white/10 rounded-3xl flex items-center justify-center text-3xl">🔧</div><p className="text-indigo-300 text-sm">Chargement...</p></div>;
  if(!user)return <LoginScreen users={users} onLogin={setUser}/>;

  function handleMissionClick(m){setSelM(m);}
  function handleNewMission(date=today()){setNewMissionDate(date);setShowNew(true);}

  function exportMonth(){const ms=visibleMissions(Object.values(storage).flat(),user).filter(isApproved);if(!ms.length){alert("Aucune intervention ce mois.");return;}downloadICS(buildICS(ms,users),`beylev-${MONTHS_FR[cal.m].toLowerCase()}-${cal.y}.ics`);}

  return(
    <div className="relative">
      {tab==="home"&&<HomeScreen storage={storage} users={users} currentUser={user} onMissionClick={handleMissionClick} onNewMission={()=>handleNewMission()} setTab={setTab} pendingCount={pendingCount} pendingMissions={globalPending} onValidation={()=>setShowValidation(true)} onHostawayImport={()=>setShowHostawayImport(true)}/>}
      {tab==="calendar"&&<CalendarScreen year={cal.y} month={cal.m} storage={storage} currentUser={user} users={users} selectedDate={selDate} onDayClick={d=>setSelDate(d)} onPrev={()=>setCal(p=>shiftMonth(p.y,p.m,-1))} onNext={()=>setCal(p=>shiftMonth(p.y,p.m,1))} onMissionClick={handleMissionClick} onNewMission={date=>handleNewMission(date)} onExport={exportMonth} onValidateAll={()=>setShowValidation(true)}/>}
      {tab==="board"&&<BoardScreen storage={storage} users={users} currentUser={user} onMissionClick={handleMissionClick} onNewMission={()=>handleNewMission()} onStatusChange={async(m,status)=>patchMission({...m,status},m.date)}/>}
      {tab==="history"&&<HistoryScreen currentUser={user} users={users}/>}
      {tab==="settings"&&<SettingsScreen currentUser={user} users={users} onSave={saveUsers} onLogout={logout}/>}

      <BottomNav tab={tab} setTab={t=>{refreshGlobalPending();if(t==="settings"&&pendingCount>0&&canAdmin)setShowValidation(true);setTab(t);}} pendingCount={pendingCount} canAdmin={canAdmin}/>

      {showValidation&&(
        <ValidationModal pending={globalPending} users={users} onClose={()=>setShowValidation(false)}
          onApprove={async m=>{const upd={...m,approved:true};await patchMissionAny(upd,m.date);st.get(SK_USERS).then(fu=>{sendMissionEmail(upd,fu||users,"validated");if(upd.hostawayId)notifyHostawayApproved(upd,fu||users);}).catch(()=>{});refreshGlobalPending();}}
          onReject={async m=>{await patchMissionAny({...m,approved:"rejected"},m.date);refreshGlobalPending();}}/>
      )}
      {selM&&(
        <MissionDetailModal mission={selM} users={users} currentUser={user}
          onClose={()=>setSelM(null)}
          onEdit={()=>{setEditM(selM);setSelM(null);}}
          onDelete={()=>{deleteMission(selM);}}
          onApprove={async()=>{const upd={...selM,approved:true};await patchMissionAny(upd,selM.date);st.get(SK_USERS).then(fu=>{sendMissionEmail(upd,fu||users,"validated");if(upd.hostawayId)notifyHostawayApproved(upd,fu||users);}).catch(()=>{});refreshGlobalPending();}}
          onReject={async()=>{await patchMissionAny({...selM,approved:"rejected"},selM.date);refreshGlobalPending();}}
          onComment={async txt=>{const c={id:uid(),text:txt,author:user.name,authorId:user.id,createdAt:new Date().toISOString()};await patchMissionAny({...selM,comments:[...(selM.comments||[]),c]},selM.date);}}
          onStatusChange={async s=>patchMissionAny({...selM,status:s},selM.date)}
          onAddPhoto={async p=>patchMissionAny({...selM,photos:[...(selM.photos||[]),p]},selM.date)}/>
      )}
      {(showNewMission||editM)&&(
        <MissionFormModal
          mission={editM}
          date={editM?.date||newMissionDate}
          users={users}
          currentUser={user}
          onClose={()=>{setShowNew(false);setEditM(null);}}
          onSave={async m=>{
            if(editM){await patchMission(m,editM.date);setEditM(null);}
            else{await addMission(m);setShowNew(false);}
          }}/>
      )}
      {showHostawayImport&&(
        <HostawayImportModal
          users={users}
          onClose={()=>setShowHostawayImport(false)}
          onSubmitTask={async m=>{await addMission(m);}}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
