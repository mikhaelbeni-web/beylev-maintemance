<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Beylev Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  try {
    firebase.initializeApp({
      apiKey:"AIzaSyB7i6PnqFAdBuGuFM84BKGYWwRT0P8GClc",
      authDomain:"planning-maintenance-9a3c4.firebaseapp.com",
      projectId:"planning-maintenance-9a3c4"
    });
    window.__db = firebase.firestore();
    window.__OK = true;
  } catch(e) { window.__OK = false; }
</script>
<script type="text/babel">
const {useState,useEffect} = React;

function App() {
  const [users, setUsers] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    window.__db.collection("app_data").doc("lv_users_v1").get().then(doc => {
      if(doc.exists) {
        const u = JSON.parse(doc.data().v);
        setUsers(u);
      }
      setLoaded(true);
    }).catch(e => {
      setLoaded(true);
    });
  }, []);

  if(!loaded) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#1e1b4b"}}>
      <div style={{color:"white",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>🔧</div>
        <p style={{fontSize:18,fontWeight:"bold"}}>Beylev Maintenance</p>
        <p style={{color:"#a5b4fc",marginTop:8}}>Chargement...</p>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#1e1b4b"}}>
      <div style={{background:"white",borderRadius:16,padding:32,maxWidth:400,width:"90%",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>🔧</div>
        <h1 style={{fontSize:24,fontWeight:"bold",color:"#1e293b",marginBottom:8}}>Beylev Maintenance</h1>
        <p style={{color:"#64748b",marginBottom:24}}>
          {users.length > 0 ? `${users.length} utilisateurs trouvés` : "Connecte-toi pour continuer"}
        </p>
        <p style={{fontSize:12,color:"#94a3b8"}}>Firebase: {window.__OK ? "✅ OK" : "❌ Erreur"}</p>
        <p style={{fontSize:12,color:"#94a3b8"}}>Utilisateurs: {users.length}</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
